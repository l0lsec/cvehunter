{% extends "base.html" %}
{% block title %}Dashboard &mdash; CVEHunter{% endblock %}

{% block content %}
<section>
  <h2>Submit CVE for Analysis</h2>
  <form id="submit-form"
        hx-post="/dashboard/actions/submit"
        hx-target="#submit-result"
        hx-swap="innerHTML"
        hx-indicator="#submit-spinner">
    <fieldset role="group">
      <input type="text" name="cve_id" placeholder="CVE-2024-12345" required
             pattern="CVE-\d{4}-\d{4,}" title="Format: CVE-YYYY-NNNNN" />
      <button type="submit">
        Analyze
        <span id="submit-spinner" class="htmx-indicator" aria-busy="true"></span>
      </button>
      <button type="button" class="secondary"
              hx-post="/dashboard/actions/collect"
              hx-include="#submit-form"
              hx-target="#submit-result"
              hx-swap="innerHTML"
              title="Run only the Collector agent">Collect only</button>
    </fieldset>
    <label>
      <input type="checkbox" name="simple_researcher" />
      Simple researcher (disable multi-model swarm)
    </label>
  </form>
  <div id="submit-result"></div>
</section>

<section>
  <h2>Analysis Runs</h2>
  <div hx-get="/dashboard/partials/runs-table"
       hx-trigger="load, every 5s"
       hx-swap="innerHTML">
    <p aria-busy="true">Loading runs&hellip;</p>
  </div>
</section>
{% endblock %}
